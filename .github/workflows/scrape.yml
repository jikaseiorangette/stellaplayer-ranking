name: Daily Ranking Scrape

on:
  schedule:
    # 毎日 JST 23:30 に実行（UTC 14:30）
    - cron: "30 14 * * *"
  workflow_dispatch:  # 手動実行ボタンも有効化

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranking.json data/history.json data/products.csv
          git diff --cached --quiet || git commit -m "chore: update ranking $(date +'%Y-%m-%d')"
          git push
