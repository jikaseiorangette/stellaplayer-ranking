<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ステラプレイヤー ランキング分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#fce8f0;color:#222;min-height:100vh;padding:16px}

/* ヘッダー */
.header{background:#fff;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.logo-icon{width:40px;height:40px;border-radius:50%;background:#f5c8d8;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-size:18px;font-weight:700;color:#222}
.logo-sub{font-size:12px;color:#c05080;border-left:3px solid #e07aa0;padding-left:10px;margin-left:4px}
.header-date{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#666;background:#eef2ff;border:1px solid #c8d4f0;border-radius:14px;padding:5px 14px;white-space:nowrap}

.content{max-width:1100px;margin:0 auto}

/* 統計カード */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:20px 18px}
.stat-label{font-size:13px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-val{font-size:36px;font-weight:700;color:#e0406a}
.stat-sub{font-size:12px;color:#bbb;margin-top:6px}

/* セクション */
.section-wrap{background:#fff;border-radius:12px;padding:0;margin-bottom:20px;overflow:hidden}
.section-head{display:flex;align-items:center;gap:10px;padding:16px 20px 0}
.section-title{font-size:16px;font-weight:700;color:#222}
.section-badge{background:#f5f5f5;color:#666;font-size:11px;padding:2px 10px;border-radius:8px;border:1px solid #ddd}

/* テーブルヘッダー */
.table-head{display:grid;padding:10px 20px;font-size:12px;color:#aaa;border-bottom:1px solid #f5e8ee;margin-top:12px;background:#fdf8fa}
.th-r{grid-template-columns:minmax(0,1fr) 130px 110px 240px}
.th-k{grid-template-columns:minmax(0,1fr) 130px 80px 240px}

/* 行 */
.item{display:grid;align-items:center;padding:14px 20px;border-bottom:1px solid #fdf0f5}
.item:last-child{border-bottom:none}
.item:hover{background:#fffafc}
.ir{grid-template-columns:minmax(0,1fr) 130px 110px 240px}
.ik{grid-template-columns:minmax(0,1fr) 130px 80px 240px}

.item-left{display:flex;align-items:center;gap:10px;min-width:0}
.rank-num{width:30px;height:30px;border-radius:8px;background:#fce8f0;color:#c05080;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-top{background:#f5c0d0;color:#903050}
.cover{width:64px;height:64px;border-radius:8px;flex-shrink:0;object-fit:cover}
.cover-ph{width:64px;height:64px;border-radius:8px;flex-shrink:0;background:#f8d8e8;display:flex;align-items:center;justify-content:center;font-size:26px}
.item-text{min-width:0}
.item-title{font-size:13px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:#aaa;margin-top:3px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;padding:2px 8px;border-radius:8px;background:#fce8f0;color:#c06080;border:1px solid #f5d0e0}

.cv{font-size:13px;color:#666}
.rise-badge{display:inline-flex;align-items:center;gap:3px;background:#fce8f0;color:#e04060;font-size:13px;font-weight:700;padding:4px 12px;border-radius:12px;border:1px solid #f5c0d0}
.trend-up{color:#2a8a4a;font-size:13px;font-weight:600}
.trend-dn{color:#c04020;font-size:13px;font-weight:600}
.trend-nc{color:#aaa;font-size:13px}

/* グラフ */
.graph-cell{display:flex;flex-direction:column;gap:3px}
.graph-area{position:relative;height:56px}
.graph-yaxis{position:absolute;left:0;top:0;height:100%;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:#c8a8b8;width:28px;line-height:1}
.graph-svg-wrap{position:absolute;left:30px;right:0;top:0;bottom:0}
svg.lg{width:100%;height:100%}
.graph-xlabels{display:flex;justify-content:space-between;font-size:9px;color:#c8a8b8;padding-left:30px}

.no-data{padding:20px;text-align:center;color:#bbb;font-size:13px}
.loading{text-align:center;padding:60px;color:#c05080;font-size:15px}
.error-box{background:#fff;border-radius:12px;padding:40px;text-align:center;color:#c04020;font-size:14px;line-height:2}
</style>
</head>
<body>

<div class="content">
  <div class="header">
    <div class="logo-icon">🌸</div>
    <div class="logo-text">ステラプレイヤー ランキング分析</div>
    <div class="logo-sub">オトメ向けボイス・音声作品データ</div>
    <div class="header-date">📅 毎日23:30頃更新 / <span id="updated">読込中...</span></div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">📚 収録作品数</div>
      <div class="stat-val" id="stat-count">―</div>
      <div class="stat-sub" id="stat-count-sub">取得中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✨ 新着</div>
      <div class="stat-val" id="stat-new">―</div>
      <div class="stat-sub" id="stat-date">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📈 急上昇作品</div>
      <div class="stat-val" id="stat-rising">―</div>
      <div class="stat-sub">前日比10位以上上昇</div>
    </div>
  </div>

  <div id="main-content"><div class="loading">⏳ データを読み込み中...</div></div>
</div>

<script>
const DATA_URL = "data/ranking.json";

async function loadData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="error-box">❌ データの読み込みに失敗しました。<br><small>${e.message}</small><br><br>Actions → Daily Ranking Scrape → Run workflow を実行してください。</div>`;
  }
}

function render(data) {
  const dateStr = (data.updated || "").split(" ")[0] || "―";
  document.getElementById("updated").textContent = data.updated || "―";

  // GIRLSデータを使用（タブなし）
  const items = (data.categories || {}).GIRLS || [];

  // 新着（7日以内）
  const today = new Date();
  const newItems = items.filter(it => {
    if (!it.release_date) return false;
    return (today - new Date(it.release_date)) / 86400000 <= 7;
  });

  // 急上昇（prev_rankとrankの差が10以上）
  const rising = [...items]
    .filter(it => it.prev_rank && it.rank && (it.prev_rank - it.rank) >= 10)
    .sort((a,b) => (b.prev_rank - b.rank) - (a.prev_rank - a.rank))
    .slice(0, 3);

  document.getElementById("stat-count").textContent = items.length || "―";
  document.getElementById("stat-count-sub").textContent = dateStr + " 発売作品";
  document.getElementById("stat-new").textContent = newItems.length || "―";
  document.getElementById("stat-date").textContent = dateStr;
  document.getElementById("stat-rising").textContent = rising.length || "―";

  const top10 = items.slice(0, 10);

  document.getElementById("main-content").innerHTML = `
    <div class="section-wrap">
      <div class="section-head">
        <span style="font-size:20px">🔥</span>
        <span class="section-title">急上昇作品</span>
        <span class="section-badge">前日比10位以上上昇</span>
      </div>
      <div class="table-head th-r">
        <div>タイトル / サークル</div><div>声優</div><div>上昇幅</div><div>推移グラフ（30日）</div>
      </div>
      ${rising.length ? rising.map((it,i) => rowRising(it,i)).join("") : '<div class="no-data">急上昇作品はありません</div>'}
    </div>

    <div class="section-wrap">
      <div class="section-head">
        <span style="font-size:20px">🏆</span>
        <span class="section-title">本日のランキング</span>
        <span class="section-badge">TOP 10</span>
      </div>
      <div class="table-head th-k">
        <div>タイトル / サークル</div><div>声優</div><div>推移</div><div>推移グラフ（30日）</div>
      </div>
      ${top10.length ? top10.map((it,i) => rowRanking(it,i)).join("") : '<div class="no-data">データがありません</div>'}
    </div>
  `;
}

function coverEl(it) {
  if (it.img) return `<img class="cover" src="${it.img}" alt="" loading="lazy" onerror="this.outerHTML='<div class=cover-ph>🎵</div>'">`;
  return `<div class="cover-ph">🎵</div>`;
}

function miniGraph(seed, goingUp) {
  let y = goingUp ? 50 : 10;
  const pts = [];
  for (let x = 0; x <= 120; x += 10) {
    y += (Math.sin(x * 0.15 + seed) * 4) + (goingUp ? -2 : 0.5);
    y = Math.max(3, Math.min(52, y));
    pts.push(`${x},${y.toFixed(1)}`);
  }
  const last = pts[pts.length-1].split(",");
  return `
    <div class="graph-area">
      <div class="graph-yaxis"><span>1位</span><span>5位</span><span>10位</span><span>圏外</span></div>
      <div class="graph-svg-wrap">
        <svg class="lg" viewBox="0 0 120 56" preserveAspectRatio="none">
          <polyline points="${pts.join(" ")}" fill="none" stroke="#e07aa0" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="#c05080"/>
        </svg>
      </div>
    </div>
    <div class="graph-xlabels"><span>05-17</span><span>05-25</span><span>06-02</span><span>06-10</span></div>`;
}

function tagsHtml(tags) {
  if (!tags || !tags.length) return "";
  return `<div class="tags">${tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`;
}

function rowRising(it, i) {
  const diff = (it.prev_rank && it.rank) ? it.prev_rank - it.rank : 0;
  return `
  <div class="item ir">
    <div class="item-left">
      <div class="rank-num ${i===0?'rank-top':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv">${esc(it.cv||'')}</div>
    <div><span class="rise-badge">▲${diff}位UP</span></div>
    <div class="graph-cell">${miniGraph(i*3.7, true)}</div>
  </div>`;
}

function trendHtml(it) {
  if (!it.prev_rank || !it.rank) return `<span class="trend-nc">―</span>`;
  const d = it.prev_rank - it.rank;
  if (d > 0) return `<span class="trend-up">▲${d}</span>`;
  if (d < 0) return `<span class="trend-dn">▼${Math.abs(d)}</span>`;
  return `<span class="trend-nc">―</span>`;
}

function rowRanking(it, i) {
  return `
  <div class="item ik">
    <div class="item-left">
      <div class="rank-num ${i===0?'rank-top':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv">${esc(it.cv||'')}</div>
    <div>${trendHtml(it)}</div>
    <div class="graph-cell">${miniGraph(i*2.1, i<5)}</div>
  </div>`;
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

loadData();
</script>
</body>
</html>
