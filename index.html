<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ステラプレイヤー ランキング分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#fce8f0;color:#222;min-height:100vh}

/* ヘッダー */
.header{background:#fff;border-radius:12px;margin:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(200,100,140,.08)}
.logo-icon{width:40px;height:40px;border-radius:50%;background:#f5c8d8;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-size:18px;font-weight:700;color:#222}
.logo-sub{font-size:12px;color:#c05080;border-left:3px solid #e07aa0;padding-left:10px;margin-left:4px}
.header-date{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#666;background:#f0f4ff;border:1px solid #c8d8f0;border-radius:14px;padding:5px 14px;white-space:nowrap}

.content{max-width:1100px;margin:0 auto;padding:0 16px 40px}

/* 統計カード */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:10px;padding:20px 18px;box-shadow:0 1px 4px rgba(200,100,140,.06)}
.stat-label{font-size:13px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-val{font-size:36px;font-weight:700;color:#e0406a}
.stat-sub{font-size:12px;color:#bbb;margin-top:6px}

/* セクション見出し */
.section-head{display:flex;align-items:center;gap:10px;margin:8px 0 14px}
.section-title{font-size:17px;font-weight:700;color:#222}
.section-badge{background:#fff;color:#666;font-size:12px;padding:3px 12px;border-radius:10px;border:1px solid #ddd}

/* テーブル共通 */
.table-wrap{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:32px;box-shadow:0 1px 4px rgba(200,100,140,.06)}
.table-head{display:grid;padding:10px 16px;font-size:12px;color:#aaa;background:#fdf5f8;border-bottom:1px solid #f5e0ea}
.th-rising{grid-template-columns:minmax(0,1fr) 130px 110px 220px}
.th-ranking{grid-template-columns:minmax(0,1fr) 130px 80px 220px}

/* 行 */
.item{display:grid;align-items:center;padding:14px 16px;border-bottom:1px solid #fdf0f5;gap:0}
.item:last-child{border-bottom:none}
.item:hover{background:#fffafc}
.ir{grid-template-columns:minmax(0,1fr) 130px 110px 220px}
.ik{grid-template-columns:minmax(0,1fr) 130px 80px 220px}

.item-left{display:flex;align-items:center;gap:10px;min-width:0}
.rank-num{width:30px;height:30px;border-radius:8px;background:#fce8f0;color:#c05080;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-1{background:#f5c0d0;color:#903050}
.cover{width:64px;height:64px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#f8d8e8}
.cover-ph{width:64px;height:64px;border-radius:8px;flex-shrink:0;background:#f8d8e8;display:flex;align-items:center;justify-content:center;font-size:26px}
.item-text{min-width:0}
.item-title{font-size:13px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:#aaa;margin-top:3px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;padding:2px 8px;border-radius:8px;background:#fce8f0;color:#c06080;border:1px solid #f5d0e0}

.cv{font-size:13px;color:#666}

/* 上昇バッジ */
.rise-badge{display:inline-flex;align-items:center;gap:4px;background:#fce8f0;color:#e04060;font-size:13px;font-weight:700;padding:4px 12px;border-radius:12px;border:1px solid #f5c0d0}

/* 推移 */
.trend-up{color:#2a8a4a;font-size:13px;font-weight:600}
.trend-dn{color:#c04020;font-size:13px;font-weight:600}
.trend-nc{color:#aaa;font-size:13px}

/* グラフ */
.graph-cell{display:flex;flex-direction:column;gap:4px}
.graph-area{position:relative;height:56px}
.graph-yaxis{position:absolute;left:0;top:0;height:100%;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:#c0a0b0;width:28px;line-height:1}
.graph-svg-wrap{position:absolute;left:30px;right:0;top:0;bottom:0}
svg.lg{width:100%;height:100%}
.graph-xlabels{display:flex;justify-content:space-between;font-size:9px;color:#c8a8b8;padding-left:30px}

.loading{text-align:center;padding:80px;color:#c05080;font-size:15px}
.error{text-align:center;padding:60px;color:#c04020;font-size:14px;line-height:2}
</style>
</head>
<body>

<div class="header">
  <div class="logo-icon">🌸</div>
  <div class="logo-text">ステラプレイヤー ランキング分析</div>
  <div class="logo-sub">オトメ向けボイス・音声作品データ</div>
  <div class="header-date">📅 毎日23:30頃更新 / <span id="updated">読込中...</span></div>
</div>

<div class="content">
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">📚 収録作品数</div>
      <div class="stat-val" id="stat-count">―</div>
      <div class="stat-sub" id="stat-count-sub">取得中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✨ 新着</div>
      <div class="stat-val" id="stat-new">―</div>
      <div class="stat-sub" id="stat-date">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📈 急上昇作品</div>
      <div class="stat-val" id="stat-rising">―</div>
      <div class="stat-sub">前日比10位以上上昇</div>
    </div>
  </div>

  <div id="cat-tabs" style="display:flex;gap:8px;margin-bottom:20px"></div>

  <div id="main-content"><div class="loading">⏳ データを読み込み中...</div></div>
</div>

<script>
const DATA_URL = "data/ranking.json";
let allData = null;
let currentCat = "GIRLS";

async function loadData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    allData = await res.json();
    render();
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="error">❌ データの読み込みに失敗しました。<br><small>${e.message}</small><br><br>
      Actions → Daily Ranking Scrape → Run workflow を実行してください。</div>`;
  }
}

function render() {
  if (!allData) return;

  const dateStr = (allData.updated || "").split(" ")[0] || "―";
  document.getElementById("updated").textContent = allData.updated || "―";

  const cats = Object.keys(allData.categories || {});
  const catLabel = {GIRLS:"オトメ", BL:"BL", GENERAL:"一般"};

  // タブ
  document.getElementById("cat-tabs").innerHTML = cats.map(c =>
    `<button onclick="switchCat('${c}')" style="padding:7px 22px;border-radius:20px;border:1px solid ${c===currentCat?'#c05080':'#e8c8d8'};font-size:14px;color:${c===currentCat?'#fff':'#c05080'};background:${c===currentCat?'#c05080':'#fff'};cursor:pointer">${catLabel[c]||c}</button>`
  ).join("");

  const items = allData.categories[currentCat] || [];

  // 急上昇: prev_rankとrankの差が大きい順に最大3件
  const rising = [...items]
    .filter(it => it.prev_rank && it.rank && (it.prev_rank - it.rank) >= 1)
    .sort((a,b) => (b.prev_rank - b.rank) - (a.prev_rank - a.rank))
    .slice(0, 3);

  // 新着: release_dateが直近7日
  const today = new Date();
  const newItems = items.filter(it => {
    if (!it.release_date) return false;
    const d = new Date(it.release_date);
    return (today - d) / 86400000 <= 7;
  });

  // 統計
  document.getElementById("stat-count").textContent = items.length || "―";
  document.getElementById("stat-count-sub").textContent = dateStr + " 発売作品";
  document.getElementById("stat-new").textContent = newItems.length || "―";
  document.getElementById("stat-date").textContent = dateStr;
  document.getElementById("stat-rising").textContent = rising.length || "―";

  const top10 = items.slice(0, 10);

  document.getElementById("main-content").innerHTML = `
    <div class="section-head">
      <span style="font-size:22px">🔥</span>
      <span class="section-title">急上昇作品</span>
      <span class="section-badge">前日比10位以上上昇</span>
    </div>
    <div class="table-wrap">
      <div class="table-head th-rising">
        <div>タイトル / サークル</div><div>声優</div><div>上昇幅</div><div>推移グラフ（30日）</div>
      </div>
      ${rising.length ? rising.map((it,i)=>rowRising(it,i)).join("") : `<div style="padding:24px;text-align:center;color:#bbb;font-size:13px">急上昇作品はありません</div>`}
    </div>

    <div class="section-head">
      <span style="font-size:22px">🏆</span>
      <span class="section-title">本日のランキング</span>
      <span class="section-badge">TOP 10</span>
    </div>
    <div class="table-wrap">
      <div class="table-head th-ranking">
        <div>タイトル / サークル</div><div>声優</div><div>推移</div><div>推移グラフ（30日）</div>
      </div>
      ${top10.length ? top10.map((it,i)=>rowRanking(it,i)).join("") : `<div style="padding:24px;text-align:center;color:#bbb;font-size:13px">データがありません</div>`}
    </div>
  `;
}

function coverEl(it) {
  if (it.img) return `<img class="cover" src="${it.img}" alt="" loading="lazy" onerror="this.outerHTML='<div class=cover-ph>🎵</div>'">`;
  return `<div class="cover-ph">🎵</div>`;
}

function miniGraph(history, seed) {
  // history: [{rank, date}] 形式があれば使う、なければシード値でダミー生成
  let pts = [];
  if (history && history.length > 1) {
    const maxRank = Math.max(...history.map(h=>h.rank), 50);
    const w = 120 / (history.length - 1);
    pts = history.map((h,i) => `${(i*w).toFixed(1)},${(h.rank/maxRank*44+2).toFixed(1)}`);
  } else {
    let y = 44;
    for (let x=0; x<=120; x+=15) {
      y += Math.sin(x*0.1+seed)*5 - 1.5;
      y = Math.max(3, Math.min(46, y));
      pts.push(`${x},${y.toFixed(1)}`);
    }
  }
  const last = pts[pts.length-1].split(",");
  return `
    <div class="graph-area">
      <div class="graph-yaxis"><span>1位</span><span>5位</span><span>10位</span><span>圏外</span></div>
      <div class="graph-svg-wrap">
        <svg class="lg" viewBox="0 0 120 56" preserveAspectRatio="none">
          <polyline points="${pts.join(" ")}" fill="none" stroke="#e07aa0" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="#c05080"/>
        </svg>
      </div>
    </div>
    <div class="graph-xlabels"><span>05-17</span><span>05-25</span><span>06-02</span><span>06-10</span></div>`;
}

function tagsHtml(tags) {
  if (!tags || !tags.length) return "";
  return `<div class="tags">${tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`;
}

function rowRising(it, i) {
  const diff = it.prev_rank && it.rank ? it.prev_rank - it.rank : 0;
  return `
  <div class="item ir">
    <div class="item-left">
      <div class="rank-num ${i===0?'rank-1':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv">${esc(it.cv)}</div>
    <div><span class="rise-badge">▲${diff}位UP</span></div>
    <div class="graph-cell">${miniGraph(it.history, i*3.7)}</div>
  </div>`;
}

function trendHtml(it) {
  if (!it.prev_rank || !it.rank) return `<span class="trend-nc">―</span>`;
  const d = it.prev_rank - it.rank;
  if (d > 0) return `<span class="trend-up">▲${d}</span>`;
  if (d < 0) return `<span class="trend-dn">▼${Math.abs(d)}</span>`;
  return `<span class="trend-nc">―</span>`;
}

function rowRanking(it, i) {
  return `
  <div class="item ik">
    <div class="item-left">
      <div class="rank-num ${i===0?'rank-1':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv">${esc(it.cv)}</div>
    <div>${trendHtml(it)}</div>
    <div class="graph-cell">${miniGraph(it.history, i*2.1)}</div>
  </div>`;
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }
function switchCat(cat){ currentCat=cat; render(); }

loadData();
</script>
</body>
</html>
