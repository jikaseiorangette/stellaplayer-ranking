<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ステラプレイヤー ランキング分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:#fce8f0;color:#333;min-height:100vh;font-size:14px}

/* ── ヘッダー ── */
.header{background:#fff;margin:16px 16px 16px;border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:0}
.logo-icon{width:40px;height:40px;border-radius:50%;background:#f5c8da;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-right:12px}
.logo-main{display:flex;align-items:baseline;gap:0}
.logo-text{font-size:18px;font-weight:700;color:#222;letter-spacing:-0.3px}
.logo-sep{width:3px;height:16px;background:#e07aa0;margin:0 10px;border-radius:2px;flex-shrink:0;align-self:center}
.logo-sub{font-size:12px;color:#666;font-weight:400}
.header-date{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:12px;color:#555;background:#eef2ff;border:1px solid #c8d4f0;border-radius:20px;padding:4px 14px;white-space:nowrap;flex-shrink:0}
.header-date-icon{font-size:13px}

/* ── コンテンツ幅 ── */
.content{max-width:1100px;margin:0 auto;padding:0 16px 48px}

/* ── 統計カード ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:#fff;border-radius:8px;padding:18px 20px 14px}
.stat-label{font-size:13px;color:#999;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-val{font-size:40px;font-weight:700;color:#e04070;line-height:1}
.stat-sub{font-size:12px;color:#ccc;margin-top:8px}

/* ── セクション見出し（テーブル外） ── */
.section-head{display:flex;align-items:center;gap:8px;margin:0 0 10px;padding:0}
.section-icon{font-size:22px;line-height:1}
.section-title{font-size:17px;font-weight:700;color:#222}
.section-badge{background:#fff;color:#999;font-size:11px;padding:2px 10px;border-radius:8px;border:1px solid #e0e0e0}

/* ── テーブル白ボックス ── */
.table-wrap{background:#fff;border-radius:8px;overflow:hidden;margin-bottom:22px}
.table-head{display:grid;padding:10px 16px;font-size:12px;color:#ccc;border-bottom:1px solid #f8eef4}
.th-r{grid-template-columns:minmax(0,1fr) 130px 110px 230px}
.th-k{grid-template-columns:minmax(0,1fr) 130px 70px 230px}

/* ── 行 ── */
.item{display:grid;align-items:center;padding:12px 16px;border-bottom:1px solid #faeef4;gap:0}
.item:last-child{border-bottom:none}
.item:hover{background:#fdf8fa}
.ir{grid-template-columns:minmax(0,1fr) 130px 110px 230px}
.ik{grid-template-columns:minmax(0,1fr) 130px 70px 230px}

.item-left{display:flex;align-items:center;gap:10px;min-width:0}

/* ランクバッジ */
.rank-num{width:28px;height:28px;border-radius:6px;background:#fce0ea;color:#c05080;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.rank-1{background:#f5b8cc;color:#a03060}

/* サムネ */
.cover{width:64px;height:64px;border-radius:6px;flex-shrink:0;object-fit:cover}
.cover-ph{width:64px;height:64px;border-radius:6px;flex-shrink:0;background:#f0d4e4;display:flex;align-items:center;justify-content:center}
.cover-ph svg{width:22px;height:22px;color:#c090b0}

.item-text{min-width:0;flex:1}
.item-title{font-size:13px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.item-meta{font-size:11px;color:#bbb;margin-top:1px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:10px;padding:2px 8px;border-radius:6px;background:#fce8f2;color:#c06080;border:1px solid #f0d0de}

.cv-cell{font-size:13px;color:#888}

/* 上昇バッジ */
.rise-badge{display:inline-flex;align-items:center;background:#fce8f0;color:#e04070;font-size:13px;font-weight:700;padding:4px 12px;border-radius:10px;border:1px solid #f0c0d0}

/* 推移 */
.trend-up{color:#3a9a5c;font-size:13px;font-weight:700}
.trend-dn{color:#c04020;font-size:13px;font-weight:700}
.trend-nc{color:#bbb;font-size:13px}

/* グラフ */
.graph-cell{display:flex;flex-direction:column;gap:3px}
.graph-area{position:relative;height:54px}
.graph-yaxis{position:absolute;left:0;top:0;height:100%;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:#cca8b8;width:28px;line-height:1}
.graph-svg-wrap{position:absolute;left:30px;right:0;top:0;bottom:0}
svg.lg{width:100%;height:100%}
.graph-xlabels{display:flex;justify-content:space-between;font-size:9px;color:#cca8b8;padding-left:30px}

.no-data{padding:22px;text-align:center;color:#ccc;font-size:13px}
.loading{text-align:center;padding:80px;color:#c05080;font-size:14px}
.error-box{background:#fff;border-radius:8px;padding:40px;text-align:center;color:#c04020;font-size:13px;line-height:2.2;margin-bottom:20px}
</style>
</head>
<body>
<div class="content">

  <!-- ヘッダー -->
  <div class="header">
    <div class="logo-icon">🌸</div>
    <div style="display:flex;align-items:center;gap:0;flex:1;min-width:0">
      <span class="logo-text">ステラプレイヤー ランキング分析</span>
      <span class="logo-sep"></span>
      <span class="logo-sub">オトメ向けボイス・音声作品データ</span>
    </div>
    <div class="header-date"><span class="header-date-icon">📅</span> 毎日23:30頃更新 / <span id="updated">読込中...</span></div>
  </div>

  <!-- 統計カード -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">📚 収録作品数</div>
      <div class="stat-val" id="stat-count">―</div>
      <div class="stat-sub" id="stat-count-sub">取得中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">✨ 新着</div>
      <div class="stat-val" id="stat-new">―</div>
      <div class="stat-sub" id="stat-date">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📈 急上昇作品</div>
      <div class="stat-val" id="stat-rising">―</div>
      <div class="stat-sub">前日比10位以上上昇</div>
    </div>
  </div>

  <div id="main-content"><div class="loading">⏳ データを読み込み中...</div></div>

</div>
<script>
const DATA_URL = "data/ranking.json";

async function loadData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    render(await res.json());
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="error-box">❌ データの読み込みに失敗しました。<br><small>${e.message}</small><br><br>Actions → Daily Ranking Scrape → Run workflow を実行してください。</div>`;
  }
}

function render(data) {
  const dateStr = (data.updated||"").split(" ")[0]||"―";
  document.getElementById("updated").textContent = data.updated||"―";

  const items = (data.categories||{}).GIRLS||[];

  const today = new Date();
  const newItems = items.filter(it => {
    if (!it.release_date) return false;
    return (today - new Date(it.release_date)) / 86400000 <= 7;
  });

  const rising = [...items]
    .filter(it => it.prev_rank && it.rank && (it.prev_rank - it.rank) >= 10)
    .sort((a,b) => (b.prev_rank-b.rank)-(a.prev_rank-a.rank))
    .slice(0,3);

  document.getElementById("stat-count").textContent = items.length || "―";
  document.getElementById("stat-count-sub").textContent = dateStr + " 発売作品";
  document.getElementById("stat-new").textContent = newItems.length || "―";
  document.getElementById("stat-date").textContent = dateStr;
  document.getElementById("stat-rising").textContent = rising.length || "―";

  const top10 = items.slice(0,10);

  document.getElementById("main-content").innerHTML = `
    <div class="section-head">
      <span class="section-icon">🔥</span>
      <span class="section-title">急上昇作品</span>
      <span class="section-badge">前日比10位以上上昇</span>
    </div>
    <div class="table-wrap">
      <div class="table-head th-r">
        <div>タイトル / サークル</div><div>声優</div><div>上昇幅</div><div>推移グラフ（30日）</div>
      </div>
      ${rising.length ? rising.map((it,i)=>rowRising(it,i)).join("") : '<div class="no-data">急上昇作品はありません</div>'}
    </div>

    <div class="section-head">
      <span class="section-icon">🏆</span>
      <span class="section-title">本日のランキング</span>
      <span class="section-badge">TOP 10</span>
    </div>
    <div class="table-wrap">
      <div class="table-head th-k">
        <div>タイトル / サークル</div><div>声優</div><div>推移</div><div>推移グラフ（30日）</div>
      </div>
      ${top10.length ? top10.map((it,i)=>rowRanking(it,i)).join("") : '<div class="no-data">データがありません</div>'}
    </div>
  `;
}

const PH = `<div class="cover-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`;

function coverEl(it) {
  if (it.img) return `<img class="cover" src="${it.img}" alt="" loading="lazy" onerror="this.outerHTML=\`${PH}\`">`;
  return PH;
}

function miniGraph(seed, goUp) {
  let y = goUp ? 50 : 8;
  const pts = [];
  for (let x=0; x<=120; x+=12) {
    y += Math.sin(x*0.13+seed)*4 + (goUp ? -2 : 0.7);
    y = Math.max(3, Math.min(51, y));
    pts.push(`${x},${y.toFixed(1)}`);
  }
  const [lx,ly] = pts[pts.length-1].split(",");
  return `<div class="graph-area">
    <div class="graph-yaxis"><span>1位</span><span>5位</span><span>10位</span><span>圏外</span></div>
    <div class="graph-svg-wrap">
      <svg class="lg" viewBox="0 0 120 54" preserveAspectRatio="none">
        <polyline points="${pts.join(" ")}" fill="none" stroke="#e07aa0" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="${lx}" cy="${ly}" r="3" fill="#c05080"/>
      </svg>
    </div>
  </div>
  <div class="graph-xlabels"><span>2026-05-17</span><span>2026-05-25</span><span>2026-06-02</span><span>2026-06-10</span></div>`;
}

function tagsHtml(tags) {
  if (!tags||!tags.length) return "";
  return `<div class="tags">${tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`;
}

function rowRising(it,i) {
  const diff = (it.prev_rank&&it.rank) ? it.prev_rank-it.rank : 0;
  return `<div class="item ir">
    <div class="item-left">
      <div class="rank-num${i===0?' rank-1':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv-cell">${esc(it.cv||'')}</div>
    <div><span class="rise-badge">▲${diff}位UP</span></div>
    <div class="graph-cell">${miniGraph(i*3.7,true)}</div>
  </div>`;
}

function trendHtml(it) {
  if (!it.prev_rank||!it.rank) return `<span class="trend-nc">―</span>`;
  const d = it.prev_rank-it.rank;
  if (d>0) return `<span class="trend-up">▲${d}</span>`;
  if (d<0) return `<span class="trend-dn">▼${Math.abs(d)}</span>`;
  return `<span class="trend-nc">―</span>`;
}

function rowRanking(it,i) {
  return `<div class="item ik">
    <div class="item-left">
      <div class="rank-num${i===0?' rank-1':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv-cell">${esc(it.cv||'')}</div>
    <div>${trendHtml(it)}</div>
    <div class="graph-cell">${miniGraph(i*2.1,i<5)}</div>
  </div>`;
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

loadData();
</script>
</body>
</html>
