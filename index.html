<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ステラプレイヤー ランキング分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:#fce8f0;color:#333;min-height:100vh}

/* ヘッダー：DLsiteと同じフラットバー */
.header{background:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;margin:16px;border-radius:10px}
.logo-icon{width:38px;height:38px;border-radius:50%;background:#f5c8d8;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.logo-text{font-size:18px;font-weight:700;color:#333;letter-spacing:0}
.logo-sub{font-size:12px;color:#c05080;border-left:3px solid #e07aa0;padding-left:8px;margin-left:6px;line-height:1.4}
.header-date{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:12px;color:#555;background:#eef2ff;border:1px solid #c5d0ee;border-radius:20px;padding:4px 12px;white-space:nowrap}

.content{max-width:1100px;margin:0 auto;padding:0 16px 40px}

/* 統計カード：DLsiteと同じ */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:8px;padding:18px 18px 14px}
.stat-label{font-size:13px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.stat-label-icon{font-size:14px}
.stat-val{font-size:38px;font-weight:700;color:#e0406a;line-height:1.1}
.stat-sub{font-size:12px;color:#bbb;margin-top:6px}

/* セクション見出し：DLsiteと同じ独立スタイル */
.section-head{display:flex;align-items:center;gap:8px;margin:8px 0 10px;padding:0 2px}
.section-icon{font-size:20px;line-height:1}
.section-title{font-size:16px;font-weight:700;color:#333}
.section-badge{background:#fff;color:#888;font-size:11px;padding:2px 10px;border-radius:8px;border:1px solid #ddd;font-weight:400}

/* テーブル：DLsiteと同じ白ボックス */
.table-wrap{background:#fff;border-radius:8px;overflow:hidden;margin-bottom:24px}
.table-head{display:grid;padding:10px 16px;font-size:12px;color:#bbb;border-bottom:1px solid #f5eaf0;background:#fff}
.th-r{grid-template-columns:minmax(0,1fr) 120px 100px 220px}
.th-k{grid-template-columns:minmax(0,1fr) 120px 70px 220px}

.item{display:grid;align-items:center;padding:12px 16px;border-bottom:1px solid #faeef4}
.item:last-child{border-bottom:none}
.item:hover{background:#fdf8fa}
.ir{grid-template-columns:minmax(0,1fr) 120px 100px 220px}
.ik{grid-template-columns:minmax(0,1fr) 120px 70px 220px}

.item-left{display:flex;align-items:center;gap:10px;min-width:0}

/* ランク番号：DLsiteと同じ丸角バッジ */
.rank-num{width:28px;height:28px;border-radius:6px;background:#fce0ea;color:#c05080;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-1{background:#f5b8cc;color:#903050}

/* サムネ：DLsiteと同じサイズ */
.cover{width:60px;height:60px;border-radius:6px;flex-shrink:0;object-fit:cover;background:#f8d8e8}
.cover-ph{width:60px;height:60px;border-radius:6px;flex-shrink:0;background:#f0d0e4;display:flex;align-items:center;justify-content:center}
.cover-ph svg{width:24px;height:24px;opacity:0.5}

.item-text{min-width:0}
.item-title{font-size:13px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.item-meta{font-size:11px;color:#aaa;margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{font-size:10px;padding:1px 7px;border-radius:6px;background:#fce8f0;color:#c06080;border:1px solid #f0d0de}

.cv-cell{font-size:13px;color:#666}

/* 上昇バッジ */
.rise-badge{display:inline-flex;align-items:center;background:#fce8f0;color:#e0406a;font-size:13px;font-weight:700;padding:3px 12px;border-radius:10px;border:1px solid #f0c0d0}

/* 推移 */
.trend-up{color:#3a9a5c;font-size:13px;font-weight:700}
.trend-dn{color:#c04020;font-size:13px;font-weight:700}
.trend-nc{color:#aaa;font-size:13px}

/* グラフ：DLsiteと同じ */
.graph-cell{display:flex;flex-direction:column;gap:3px}
.graph-area{position:relative;height:52px}
.graph-yaxis{position:absolute;left:0;top:0;height:100%;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:#cdb0bc;width:28px;line-height:1}
.graph-svg-wrap{position:absolute;left:30px;right:0;top:0;bottom:0}
svg.lg{width:100%;height:100%}
.graph-xlabels{display:flex;justify-content:space-between;font-size:9px;color:#cdb0bc;padding-left:30px}

.no-data{padding:20px;text-align:center;color:#ccc;font-size:13px}
.loading{text-align:center;padding:80px;color:#c05080;font-size:14px}
.error-box{background:#fff;border-radius:8px;padding:40px;text-align:center;color:#c04020;font-size:13px;line-height:2.2}
</style>
</head>
<body>
<div class="content">

  <div class="header">
    <div class="logo-icon">🌸</div>
    <div class="logo-text">ステラプレイヤー ランキング分析</div>
    <div class="logo-sub">オトメ向けボイス・音声作品データ</div>
    <div class="header-date">📅 毎日23:30頃更新 / <span id="updated">読込中...</span></div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label"><span class="stat-label-icon">📚</span> 収録作品数</div>
      <div class="stat-val" id="stat-count">―</div>
      <div class="stat-sub" id="stat-count-sub">取得中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="stat-label-icon">✨</span> 新着</div>
      <div class="stat-val" id="stat-new">―</div>
      <div class="stat-sub" id="stat-date">―</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="stat-label-icon">📈</span> 急上昇作品</div>
      <div class="stat-val" id="stat-rising">―</div>
      <div class="stat-sub">前日比10位以上上昇</div>
    </div>
  </div>

  <div id="main-content"><div class="loading">⏳ データを読み込み中...</div></div>

</div>
<script>
const DATA_URL = "data/ranking.json";

async function loadData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    render(await res.json());
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="error-box">❌ データの読み込みに失敗しました。<br><small>${e.message}</small><br><br>Actions → Daily Ranking Scrape → Run workflow を実行してください。</div>`;
  }
}

function render(data) {
  const dateStr = (data.updated||"").split(" ")[0]||"―";
  document.getElementById("updated").textContent = data.updated||"―";

  const items = (data.categories||{}).GIRLS||[];

  const today = new Date();
  const newItems = items.filter(it=>{
    if(!it.release_date) return false;
    return (today - new Date(it.release_date))/86400000 <= 7;
  });

  const rising = [...items]
    .filter(it=>it.prev_rank && it.rank && (it.prev_rank - it.rank) >= 10)
    .sort((a,b)=>(b.prev_rank-b.rank)-(a.prev_rank-a.rank))
    .slice(0,3);

  document.getElementById("stat-count").textContent = items.length||"―";
  document.getElementById("stat-count-sub").textContent = dateStr+" 発売作品";
  document.getElementById("stat-new").textContent = newItems.length||"―";
  document.getElementById("stat-date").textContent = dateStr;
  document.getElementById("stat-rising").textContent = rising.length||"―";

  const top10 = items.slice(0,10);

  document.getElementById("main-content").innerHTML = `
    <div class="section-head">
      <span class="section-icon">🔥</span>
      <span class="section-title">急上昇作品</span>
      <span class="section-badge">前日比10位以上上昇</span>
    </div>
    <div class="table-wrap">
      <div class="table-head th-r">
        <div>タイトル / サークル</div><div>声優</div><div>上昇幅</div><div>推移グラフ（30日）</div>
      </div>
      ${rising.length ? rising.map((it,i)=>rowRising(it,i)).join("") : '<div class="no-data">急上昇作品はありません</div>'}
    </div>

    <div class="section-head">
      <span class="section-icon">🏆</span>
      <span class="section-title">本日のランキング</span>
      <span class="section-badge">TOP 10</span>
    </div>
    <div class="table-wrap">
      <div class="table-head th-k">
        <div>タイトル / サークル</div><div>声優</div><div>推移</div><div>推移グラフ（30日）</div>
      </div>
      ${top10.length ? top10.map((it,i)=>rowRanking(it,i)).join("") : '<div class="no-data">データがありません</div>'}
    </div>
  `;
}

const MUSIC_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="#c090b0" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;

function coverEl(it) {
  if (it.img) return `<img class="cover" src="${it.img}" alt="" loading="lazy" onerror="this.outerHTML='<div class=cover-ph>${MUSIC_ICON}</div>'">`;
  return `<div class="cover-ph">${MUSIC_ICON}</div>`;
}

function miniGraph(seed, goUp) {
  let y = goUp ? 48 : 10;
  const pts = [];
  for (let x=0; x<=120; x+=12) {
    y += Math.sin(x*0.13+seed)*5 + (goUp ? -2.2 : 0.8);
    y = Math.max(3, Math.min(50, y));
    pts.push(`${x},${y.toFixed(1)}`);
  }
  const last = pts[pts.length-1].split(",");
  return `<div class="graph-area">
    <div class="graph-yaxis"><span>1位</span><span>5位</span><span>10位</span><span>圏外</span></div>
    <div class="graph-svg-wrap">
      <svg class="lg" viewBox="0 0 120 52" preserveAspectRatio="none">
        <polyline points="${pts.join(" ")}" fill="none" stroke="#e07aa0" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="#c05080"/>
      </svg>
    </div>
  </div>
  <div class="graph-xlabels"><span>2026-05-17</span><span>2026-05-25</span><span>2026-06-02</span><span>2026-06-10</span></div>`;
}

function tagsHtml(tags) {
  if (!tags||!tags.length) return "";
  return `<div class="tags">${tags.slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`;
}

function rowRising(it,i) {
  const diff = (it.prev_rank&&it.rank) ? it.prev_rank-it.rank : 0;
  return `<div class="item ir">
    <div class="item-left">
      <div class="rank-num ${i===0?'rank-1':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv-cell">${esc(it.cv||'')}</div>
    <div><span class="rise-badge">▲${diff}位UP</span></div>
    <div class="graph-cell">${miniGraph(i*3.7, true)}</div>
  </div>`;
}

function trendHtml(it) {
  if (!it.prev_rank||!it.rank) return `<span class="trend-nc">―</span>`;
  const d = it.prev_rank - it.rank;
  if (d>0) return `<span class="trend-up">▲${d}</span>`;
  if (d<0) return `<span class="trend-dn">▼${Math.abs(d)}</span>`;
  return `<span class="trend-nc">―</span>`;
}

function rowRanking(it,i) {
  return `<div class="item ik">
    <div class="item-left">
      <div class="rank-num ${i===0?'rank-1':''}">${it.rank||i+1}</div>
      ${coverEl(it)}
      <div class="item-text">
        <div class="item-title">${esc(it.title)}</div>
        <div class="item-meta">${esc(it.release_date||'')} ${esc(it.circle||'')}</div>
        ${tagsHtml(it.tags)}
      </div>
    </div>
    <div class="cv-cell">${esc(it.cv||'')}</div>
    <div>${trendHtml(it)}</div>
    <div class="graph-cell">${miniGraph(i*2.1, i<5)}</div>
  </div>`;
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

loadData();
</script>
</body>
</html>
